name: Mark Stale Issues and PRs

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v9.0.0
        with:
          # ── Issues ────────────────────────────────────────────────────────────
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: >
            This issue has been open for 30 days with no activity.
            It will be closed in 7 days unless there is new activity.
            If this is still relevant, please leave a comment or update the issue.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still relevant.

          # ── Pull Requests ─────────────────────────────────────────────────────
          days-before-pr-stale: 21
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: >
            This pull request has been open for 21 days with no activity.
            It will be closed in 7 days unless there is new activity.
            If you are still working on this, please push an update or leave a comment.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen when ready.

          # ── Never stale ───────────────────────────────────────────────────────
          exempt-issue-labels: 'pinned,security,in-progress,blocked'
          exempt-pr-labels: 'pinned,security,in-progress,blocked'

          # ── Limits ────────────────────────────────────────────────────────────
          operations-per-run: 100

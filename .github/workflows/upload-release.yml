name: Upload Release Asset
on:
  workflow_dispatch:
jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.prepare.outputs.tag_name }}
      version: ${{ steps.prepare.outputs.version }}
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'
      - name: Set version, commit, tag and create release
        id: prepare
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          BASE_VERSION="$(node ./Scripts/SetVersionByDate.mjs)"
          git fetch --tags

          # Build a valid 3-part semver: YEAR.MONTHDAY.BUILD
          # e.g. first release on Apr 6 → 2026.406.0, second → 2026.406.1
          COUNTER=0
          VERSION="${BASE_VERSION}.${COUNTER}"
          TAG_NAME="v${VERSION}"
          while git rev-parse "${TAG_NAME}" >/dev/null 2>&1; do
            COUNTER=$((COUNTER + 1))
            VERSION="${BASE_VERSION}.${COUNTER}"
            TAG_NAME="v${VERSION}"
          done

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

          # Update package.json to the final version (may differ from what SetVersionByDate wrote)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet package.json; then
            git add package.json
            git commit -m "chore(release): bump version to ${VERSION}"
            git push origin HEAD
          else
            echo "Version already set to ${VERSION}; no commit needed."
          fi

          git tag "${TAG_NAME}"
          git push origin "${TAG_NAME}"

          gh release create "${TAG_NAME}" \
            --title "Release ${VERSION}" \
            --notes "v${VERSION} — Yes, I've released another version. Do try to contain your excitement. This one includes refined internals, improved performance, and the quiet elimination of several bugs that clearly stood no chance against me. Commits have been... corrected, stability has been enforced, and the overall experience is now far less embarrassing. You may pull, build, or deploy at your convenience—just don't break it again."

  build-and-upload:
    needs: prepare-release
    strategy:
      matrix:
        include:
          - os: windows-latest
            ext: exe
            target: '--win nsis'
            new_name: Joanium.exe
          - os: ubuntu-latest
            ext: AppImage
            target: '--linux AppImage'
            new_name: Joanium.AppImage
          - os: macos-latest
            ext: dmg
            target: '--mac dmg'
            new_name: Joanium.dmg
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag_name }}
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'
      - name: Install dependencies
        run: npm install
      - name: Build application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- ${{ matrix.target }} --publish always
      - name: Rename and upload executable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          FILE="$(find . -maxdepth 2 -type f -name "*.${{ matrix.ext }}" | head -n 1)"
          if [ -z "$FILE" ]; then
            echo "Could not find any .${{ matrix.ext }} file in the dist folder."
            exit 1
          fi
          mv "$FILE" "${{ matrix.new_name }}"
          gh release upload "${{ needs.prepare-release.outputs.tag_name }}" "${{ matrix.new_name }}" --clobber

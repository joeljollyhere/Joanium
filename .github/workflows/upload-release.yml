name: Upload Release Asset

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    strategy:
      matrix:
        include:
          - os: windows-latest
            ext: exe
            new_name: Joanium.exe
          - os: ubuntu-latest
            ext: AppImage
            new_name: Joanium.AppImage
          - os: macos-latest
            ext: dmg
            new_name: Joanium.dmg

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # Needed for uploading to the release

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Install dependencies
        run: npm install

      - name: Build application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Rename and upload executable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd dist

          # Find the appropriate built file (handles if it's in a subdirectory like dist/mac/)
          FILE=$(find . -maxdepth 2 -type f -name "*.${{ matrix.ext }}" | head -n 1)

          if [ -n "$FILE" ]; then
            echo "Found target file: $FILE"
            
            # Move and rename the file into the dist directory root
            mv "$FILE" "${{ matrix.new_name }}"
            echo "Renamed executable to: ${{ matrix.new_name }}"
            
            # Upload the renamed file to the current release using GitHub CLI
            gh release upload ${{ github.event.release.tag_name }} "${{ matrix.new_name }}" --clobber
          else
            echo "Could not find any .${{ matrix.ext }} file in the dist folder."
            exit 1
          fi

<!DOCTYPE html>
<html lang="en" class="scroll-smooth" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>openworld — Skills</title>
  <link rel="stylesheet" href="Assets/Styles/SkillsPage.css" />
</head>
<body>

  <div id="app">

    <div id="titlebar">
      <div id="titlebar-drag">
        <svg class="titlebar-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M12 2L8 6H4v4L2 12l2 2v4h4l4 4 4-4h4v-4l2-2-2-2V6h-4L12 2z" stroke-width="1.5"/>
        </svg>
        <span class="titlebar-name">openworld</span>
      </div>
      <div id="titlebar-controls">
        <button id="btn-minimize" title="Minimize">
          <svg viewBox="0 0 12 12"><rect y="5.5" width="12" height="1" fill="currentColor"/></svg>
        </button>
        <button id="btn-maximize" title="Maximize / Restore">
          <svg viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
        <button id="btn-close" title="Close">
          <svg viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div id="body-wrap">
      <aside id="sidebar"></aside>
      <div id="theme-panel"></div>
      <div id="avatar-panel"></div>

      <main id="main" class="skills-main">
        <div class="skills-scroll">

          <!-- Page header -->
          <div class="skills-page-header">
            <div class="skills-page-header-copy">
              <h2>Skills</h2>
              <p>Installed capabilities the AI applies automatically when relevant</p>
            </div>
            <span class="page-count" id="skills-count"></span>
          </div>

          <!-- Search bar (hidden until skills load) -->
          <div id="skills-search-wrapper" class="page-search-wrapper" hidden>
            <div class="page-search-box">
              <svg class="page-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="11" cy="11" r="7"/>
                <path d="M16.5 16.5L21 21" stroke-linecap="round"/>
              </svg>
              <input
                id="skills-search"
                type="text"
                class="page-search-input"
                placeholder="Search by name, trigger, description…"
                autocomplete="off"
                spellcheck="false"
              />
              <button class="page-search-clear" id="skills-search-clear" type="button" aria-label="Clear search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Empty state (no skills installed) -->
          <div id="skills-empty" class="page-empty">
            <div class="page-empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h3>No skills installed</h3>
            <p>Add <code>.md</code> skill files to the <code>Skills/</code> directory — they'll appear here automatically.</p>
          </div>

          <!-- Skills grid -->
          <div id="skills-grid" class="skills-grid" hidden></div>

        </div>
      </main>
    </div>
  </div>

  <!-- Skill content modal -->
  <div id="skill-modal-backdrop">
    <div id="skill-modal" role="dialog" aria-modal="true" aria-labelledby="skill-modal-name">
      <div class="skill-modal-header">
        <div class="skill-modal-title-group">
          <div class="skill-modal-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="skill-modal-name" id="skill-modal-name">Skill</span>
        </div>
        <button class="settings-modal-close" id="skill-modal-close" type="button" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
          </svg>
        </button>
      </div>
      <div class="skill-modal-body">
        <div id="skill-modal-content" class="skill-modal-content"></div>
      </div>
    </div>
  </div>

  <script type="module" src="Assets/Scripts/Pages/Skills.js"></script>
</body>
</html>

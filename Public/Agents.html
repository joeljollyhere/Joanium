<!DOCTYPE html>
<html lang="en" class="scroll-smooth" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>openworld — Agents</title>
  <link rel="stylesheet" href="Assets/Styles/AgentsPage.css" />
</head>
<body>

  <div id="app">

    <div id="titlebar">
      <div id="titlebar-drag">
        <svg class="titlebar-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M12 2L8 6H4v4L2 12l2 2v4h4l4 4 4-4h4v-4l2-2-2-2V6h-4L12 2z" stroke-width="1.5"/>
        </svg>
        <span class="titlebar-name">openworld</span>
      </div>
      <div id="titlebar-controls">
        <button id="btn-minimize" title="Minimize">
          <svg viewBox="0 0 12 12"><rect y="5.5" width="12" height="1" fill="currentColor"/></svg>
        </button>
        <button id="btn-maximize" title="Maximize / Restore">
          <svg viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
        <button id="btn-close" title="Close">
          <svg viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div id="body-wrap">
      <aside id="sidebar"></aside>
      <div id="theme-panel"></div>
      <div id="avatar-panel"></div>

      <main id="main" class="agents-main">
        <div class="agents-scroll">

          <!-- Page header -->
          <div class="agents-page-header">
            <div class="agents-page-header-copy">
              <h2>Agents</h2>
              <p>Choose a persona for your AI — the active agent shapes every conversation</p>
            </div>
            <span class="page-count" id="agents-count"></span>
          </div>

          <!-- Active agent banner -->
          <div id="agents-active-banner" class="agents-active-banner" hidden>
            <div class="agents-active-banner-dot"></div>
            <div class="agents-active-banner-text">
              Active agent: <strong id="agents-active-name">Default Assistant</strong>
            </div>
          </div>

          <!-- Search bar -->
          <div id="agents-search-wrapper" class="page-search-wrapper">
            <div class="page-search-box">
              <svg class="page-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="11" cy="11" r="7"/>
                <path d="M16.5 16.5L21 21" stroke-linecap="round"/>
              </svg>
              <input
                id="agents-search"
                type="text"
                class="page-search-input"
                placeholder="Search by name, personality, description…"
                autocomplete="off"
                spellcheck="false"
              />
              <button class="page-search-clear" id="agents-search-clear" type="button" aria-label="Clear search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Merged agents grid (default + installed, all together) -->
          <div id="agents-grid" class="agents-grid"></div>

        </div>
      </main>
    </div>
  </div>

  <script type="module" src="Assets/Scripts/Pages/Agents.js"></script>
</body>
</html>

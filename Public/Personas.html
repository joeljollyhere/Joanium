<!DOCTYPE html>
<html lang="en" class="scroll-smooth" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>openworld — Personas</title>
  <link rel="stylesheet" href="Assets/Styles/PersonasPage.css" />
</head>
<body>

  <div id="app">

    <div id="titlebar">
      <div id="titlebar-drag">
        <svg class="titlebar-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M12 2L8 6H4v4L2 12l2 2v4h4l4 4 4-4h4v-4l2-2-2-2V6h-4L12 2z" stroke-width="1.5"/>
        </svg>
        <span class="titlebar-name">openworld</span>
      </div>
      <div id="titlebar-controls">
        <button id="btn-minimize" title="Minimize">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="10" x2="15" y2="10" />
          </svg>
        </button>
        <button id="btn-maximize" title="Maximize / Restore">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="5" width="10" height="10" rx="2" ry="2" />
          </svg>
        </button>
        <button id="btn-close" title="Close">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="6" y1="6" x2="14" y2="14" />
            <line x1="14" y1="6" x2="6" y2="14" />
          </svg>
        </button>
      </div>
    </div>

    <div id="body-wrap">
      <aside id="sidebar"></aside>
      <div id="theme-panel"></div>
      <div id="avatar-panel"></div>

      <main id="main" class="personas-main">
        <div class="personas-scroll">

          <!-- Page header -->
          <div class="personas-page-header">
            <div class="personas-page-header-copy">
              <h2>Personas</h2>
              <p>Choose a personality for your AI — the active persona shapes every conversation</p>
            </div>
            <span class="page-count" id="personas-count"></span>
          </div>

          <!-- Active persona banner -->
          <div id="personas-active-banner" class="personas-active-banner" hidden>
            <div class="personas-active-banner-dot"></div>
            <div class="personas-active-banner-text">
              Active persona: <strong id="personas-active-name">Default Assistant</strong>
            </div>
          </div>

          <!-- Search bar -->
          <div id="personas-search-wrapper" class="page-search-wrapper">
            <div class="page-search-box">
              <svg class="page-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="11" cy="11" r="7"/>
                <path d="M16.5 16.5L21 21" stroke-linecap="round"/>
              </svg>
              <input
                id="personas-search"
                type="text"
                class="page-search-input"
                placeholder="Search by name, personality, description…"
                autocomplete="off"
                spellcheck="false"
              />
              <button class="page-search-clear" id="personas-search-clear" type="button" aria-label="Clear search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Personas grid -->
          <div id="personas-grid" class="personas-grid"></div>

        </div>
      </main>
    </div>
  </div>

  <script type="module" src="Assets/Scripts/Pages/Personas.js"></script>
</body>
</html>

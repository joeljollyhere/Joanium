<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>openworld — Setup</title>
  <link rel="stylesheet" href="Assets/Styles/Themes.css" />
  <link rel="stylesheet" href="Assets/Styles/Root.css" />
  <link rel="stylesheet" href="Assets/Styles/Main.css" />
  <link rel="stylesheet" href="Assets/Styles/Setup.css" />
</head>

<body>

  <!-- Logo -->
  <div class="setup-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M12 2L8 6H4v4L2 12l2 2v4h4l4 4 4-4h4v-4l2-2-2-2V6h-4L12 2z" stroke-width="1.5" />
    </svg>
    <span class="setup-logo-name">openworld</span>
  </div>

  <!-- Progress dots -->
  <div class="progress-track">
    <div class="dot active" id="dot-1"></div>
    <div class="dot" id="dot-2"></div>
    <div class="dot" id="dot-3"></div>
  </div>

  <!-- ── Step 1: Name ── -->
  <div class="step visible" id="step-name">
    <span class="step-eyebrow">Welcome</span>
    <h1 class="step-title">What should we call you?</h1>
    <p class="step-sub">This is how openworld will greet you every time you open the app.</p>
    <div class="name-field">
      <input type="text" id="name-input" placeholder="Your name" maxlength="40" autocomplete="off" spellcheck="false" />
    </div>
    <button class="btn-primary" id="name-continue">Continue →</button>
  </div>

  <!-- ── Step 2: Providers ── -->
  <div class="step" id="step-providers" style="display:none; max-width: 500px; gap: 20px;">
    <span class="step-eyebrow">Connect</span>
    <h1 class="step-title">Choose your AI providers</h1>
    <p class="step-sub">Select one or more. You can always add more later in Settings.</p>
    <div id="provider-grid"></div>
    <div id="keys-section"></div>
    <button class="btn-primary" id="keys-continue">Finish setup →</button>
  </div>

  <!-- ── Step 3: Done ── -->
  <div class="step" id="step-done" style="display:none; gap: 20px;">
    <div class="done-anim">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M12 2L8 6H4v4L2 12l2 2v4h4l4 4 4-4h4v-4l2-2-2-2V6h-4L12 2z" stroke-width="1.4" />
      </svg>
    </div>
    <h1 class="step-title" id="done-title">You're all set!</h1>
    <p class="done-sub">Launching openworld…</p>
  </div>

  <!-- Footer credit -->
  <p class="setup-footer-credit">
    Made with ❤️ by <a href="https://joeljolly.vercel.app" target="_blank" rel="noopener noreferrer"
      class="credit-name">Joel Jolly</a>
  </p>

  <script src="Assets/Scripts/Setup.js"></script>
</body>

</html>

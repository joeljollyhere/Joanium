<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
    CRITICAL: Theme must apply BEFORE any CSS loads to prevent flash.
    Inline script runs synchronously before first paint.
  -->
  <script src="../Packages/Renderer/Features/Themes/index.js"></script>

  <!--
    ALL page CSS loaded here upfront.
    This is the entire fix for FOUC and the "modals flash briefly" bug.
    Because all CSS is parsed before JS runs, every element starts with
    the correct display:none / opacity:0 state immediately.
  -->
  <link rel="stylesheet" href="Assets/Styles/ChatPage.css" />
  <!-- Other page CSS is injected lazily when each page first mounts -->
</head>

<body>
  <div id="app">

    <!-- ── Titlebar ── -->
    <div id="titlebar">
      <div id="titlebar-drag">
        <svg class="titlebar-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M12 2L8 6H4v4L2 12l2 2v4h4l4 4 4-4h4v-4l2-2-2-2V6h-4L12 2z" stroke-width="1.5" />
        </svg>
        <span class="titlebar-name">Joanium</span>
      </div>
      <div id="titlebar-controls">
        <button id="btn-minimize" title="Minimize">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="5" y1="10" x2="15" y2="10" />
          </svg>
        </button>
        <button id="btn-maximize" title="Maximize / Restore">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="5" y="5" width="10" height="10" rx="2" ry="2" />
          </svg>
        </button>
        <button id="btn-close" title="Close">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="6" y1="6" x2="14" y2="14" />
            <line x1="14" y1="6" x2="6" y2="14" />
          </svg>
        </button>
      </div>
    </div>

    <!-- ── Body wrap ── -->
    <div id="body-wrap">

      <!-- Sidebar, theme panel, avatar panel — always present, mounted by App.js -->
      <aside id="sidebar"></aside>
      <div id="theme-panel"></div>
      <div id="avatar-panel"></div>

      <!--
      Page content outlet — this is where each page mounts its HTML.
      It replaces the old per-page <main> that lived in separate HTML files.
    -->
      <div id="page-outlet"></div>

    </div><!-- /body-wrap -->
  </div><!-- /app -->

  <!-- Single entry point. Everything else is lazy-loaded per page. -->
  <script type="module" src="../Packages/Renderer/Application/Main.js"></script>
</body>

</html>
